<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura | AI Content Verifier</title>
    <style>
        :root {
            --primary: #007aff;
            --bg: #f5f5f7;
            --card: #ffffff;
            --text-main: #1d1d1f;
            --text-muted: #86868b;
            
            /* Traffic Light System */
            --success-bg: #e8f5e9; --success-border: #4caf50; --success-text: #2e7d32;
            --warning-bg: #fff8e1; --warning-border: #ffb300; --warning-text: #f57f17;
            --danger-bg: #ffebee; --danger-border: #ef5350; --danger-text: #c62828;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: var(--card);
            max-width: 600px;
            width: 100%;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            box-sizing: border-box;
        }

        h1 { margin-top: 0; font-size: 28px; text-align: center; }
        p.subtitle { text-align: center; color: var(--text-muted); margin-bottom: 30px; }

        /* Tabs */
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn {
            flex: 1; padding: 12px; border: none; background: #f0f0f0; 
            border-radius: 10px; cursor: pointer; font-weight: 600; color: var(--text-muted);
            transition: all 0.2s;
        }
        .tab-btn.active { background: var(--primary); color: white; }

        /* Inputs */
        .input-group { display: none; }
        .input-group.active { display: block; }
        
        textarea {
            width: 100%; height: 150px; padding: 15px; border: 1px solid #ddd;
            border-radius: 12px; font-size: 15px; resize: vertical; box-sizing: border-box;
            font-family: inherit; margin-bottom: 20px;
        }
        textarea:focus { outline: none; border-color: var(--primary); }

        .file-upload-wrapper {
            border: 2px dashed #ddd; border-radius: 12px; padding: 40px 20px;
            text-align: center; margin-bottom: 20px; background: #fafafa;
        }
        input[type="file"] { margin-top: 10px; }

        /* Action Button */
        .analyze-btn {
            width: 100%; background-color: var(--text-main); color: white;
            border: none; padding: 16px; border-radius: 12px; font-size: 16px;
            font-weight: 600; cursor: pointer; transition: background 0.2s;
        }
        .analyze-btn:hover { background-color: #000; }
        .analyze-btn:disabled { background-color: #ccc; cursor: not-allowed; }

        /* Results Box */
        #result-box {
            margin-top: 30px; padding: 25px; border-radius: 12px; display: none;
            border-left: 5px solid; text-align: center;
        }
        #result-box.success { background: var(--success-bg); border-color: var(--success-border); color: var(--success-text); }
        #result-box.warning { background: var(--warning-bg); border-color: var(--warning-border); color: var(--warning-text); }
        #result-box.danger { background: var(--danger-bg); border-color: var(--danger-border); color: var(--danger-text); }

        #result-title { margin: 0 0 10px 0; font-size: 20px; }
        #result-confidence { margin: 0; font-weight: 500; }

        .disclaimer {
            font-size: 12px; color: var(--text-muted); text-align: center;
            margin-top: 30px; line-height: 1.5;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Content Verifier</h1>
        <p class="subtitle">Detect AI-generated text, images, and videos.</p>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('text')">Text</button>
            <button class="tab-btn" onclick="switchTab('media')">Image / Video</button>
        </div>

        <div id="text-input-group" class="input-group active">
            <textarea id="text-input" placeholder="Paste an article or essay here (minimum 10 words)..."></textarea>
            <button class="analyze-btn" id="btn-text" onclick="analyze('text')">Analyze Text</button>
        </div>

        <div id="media-input-group" class="input-group">
            <div class="file-upload-wrapper">
                <p style="margin:0 0 10px 0; color:var(--text-muted);">Select a .jpg, .png, or .mp4 file</p>
                <input type="file" id="file-input" accept="image/*,video/*">
            </div>
            <button class="analyze-btn" id="btn-media" onclick="analyze('file')">Analyze Media</button>
        </div>

        <div id="result-box">
            <h2 id="result-title"></h2>
            <p id="result-confidence"></p>
        </div>

        <p class="disclaimer">
            *Disclaimer: AI detection models rely on probabilistic pattern recognition and may produce false positives. This tool provides an analytical estimation and should not be used as definitive proof.
        </p>
    </div>

    <script>
        // Update this URL to your Render API address!
        const API_BASE_URL = 'https://ai-detector-api.onrender.com';

        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.input-group').forEach(g => g.classList.remove('active'));
            
            if(tab === 'text') {
                document.querySelector('.tab-btn:nth-child(1)').classList.add('active');
                document.getElementById('text-input-group').classList.add('active');
            } else {
                document.querySelector('.tab-btn:nth-child(2)').classList.add('active');
                document.getElementById('media-input-group').classList.add('active');
            }
            document.getElementById('result-box').style.display = 'none';
        }

        async function analyze(type) {
            const resultBox = document.getElementById('result-box');
            const resultTitle = document.getElementById('result-title');
            const resultConf = document.getElementById('result-confidence');
            const activeBtn = type === 'text' ? document.getElementById('btn-text') : document.getElementById('btn-media');
            
            let endpoint = '';
            let options = { method: 'POST' };

            resultBox.style.display = "none";
            
            if (type === 'text') {
                const text = document.getElementById('text-input').value;
                if (!text || text.split(' ').length < 10) return alert("Please enter at least 10 words.");
                endpoint = `${API_BASE_URL}/analyze-text`;
                options.headers = { 'Content-Type': 'application/json' };
                options.body = JSON.stringify({ text: text });
            } else {
                const fileInput = document.getElementById('file-input');
                if (!fileInput.files.length) return alert("Please select a file first.");
                const file = fileInput.files[0];
                
                endpoint = file.type.startsWith('image') 
                    ? `${API_BASE_URL}/analyze-image` 
                    : `${API_BASE_URL}/analyze-video`;
                
                const formData = new FormData();
                formData.append("file", file);
                options.body = formData;
            }

            // Loading state
            const originalText = activeBtn.innerText;
            activeBtn.innerText = "Analyzing...";
            activeBtn.disabled = true;

            try {
                const response = await fetch(endpoint, options);
                const data = await response.json();

                if (data.error) {
                    alert("Analysis Error: " + data.error);
                } else {
                    // Apply Traffic Light Styling from Backend
                    resultBox.style.display = "block";
                    resultBox.className = data.level; // 'success', 'warning', or 'danger'
                    
                    // Set Icon based on level
                    let icon = data.level === 'danger' ? '⚠️' : data.level === 'warning' ? '🔍' : '✅';
                    
                    resultTitle.innerText = `${icon} ${data.status}`;
                    resultConf.innerText = `System Confidence: ${data.confidence}%`;
                }
            } catch (error) {
                console.error("Fetch Error:", error);
                alert("Failed to connect to the analysis engine. Please try again.");
            } finally {
                activeBtn.innerText = originalText;
                activeBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
