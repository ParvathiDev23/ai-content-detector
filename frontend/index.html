<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multimodal AI Content Verifier</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 40px; max-width: 800px; margin: 0 auto; background-color: #f9f9f9; }
        textarea { width: 100%; height: 200px; padding: 15px; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; margin-bottom: 20px; box-sizing: border-box; }
        input[type="file"] { margin-bottom: 20px; display: block; }
        button { background-color: #007aff; color: white; border: none; padding: 12px 24px; border-radius: 8px; font-size: 16px; cursor: pointer; margin-bottom: 20px; }
        button:hover { background-color: #005bb5; }
        #result-box { margin-top: 30px; padding: 20px; border-radius: 8px; display: none; }
        .ai-detected { background-color: #ffebee; border: 1px solid #ffcdd2; color: #c62828; }
        .human-detected { background-color: #e8f5e9; border: 1px solid #c8e6c9; color: #2e7d32; }
    </style>
</head>
<body>
    <h1>Multimodal AI Content Verifier</h1>
    <p>Analyze text, images, or video frames for AI generation.</p>

    <h3>Analyze Text</h3>
    <textarea id="text-input" placeholder="Enter at least 10 words here..."></textarea>
    <button onclick="analyze('text')" id="btn-text">Analyze Text</button>

    <h3>Analyze Image or Video</h3>
    <input type="file" id="file-input" accept="image/*,video/*">
    <button onclick="analyze('file')" id="btn-file">Analyze File</button>

    <div id="result-box">
        <h2 id="result-title"></h2>
        <p id="result-confidence"></p>
    </div>

    <script>
        // Make sure this points to your live Render URL!
        const API_BASE_URL = 'https://ai-detector-api.onrender.com';

        async function analyze(type) {
            const resultBox = document.getElementById('result-box');
            const resultTitle = document.getElementById('result-title');
            const resultConfidence = document.getElementById('result-confidence');
            let endpoint = '';
            let payload;
            let options = { method: 'POST' };

            resultBox.style.display = "none";

            if (type === 'text') {
                const text = document.getElementById('text-input').value;
                if (!text || text.split(' ').length < 10) return alert("Enter 10+ words.");
                endpoint = `${API_BASE_URL}/analyze-text`;
                options.headers = { 'Content-Type': 'application/json' };
                options.body = JSON.stringify({ text: text });
            } else {
                const fileInput = document.getElementById('file-input');
                if (!fileInput.files.length) return alert("Select a file.");
                const file = fileInput.files[0];
                
                endpoint = file.type.startsWith('image') 
                    ? `${API_BASE_URL}/analyze-image` 
                    : `${API_BASE_URL}/analyze-video`;
                
                const formData = new FormData();
                formData.append("file", file);
                options.body = formData; 
            }

            try {
                const response = await fetch(endpoint, options);
                const data = await response.json();

                if (data.error) {
                    alert(data.error);
                } else {
                    resultBox.style.display = "block";
                    resultBox.className = data.is_ai ? "ai-detected" : "human-detected";
                    resultTitle.innerText = data.is_ai ? `⚠️ AI Generated ${data.type} Detected` : `✅ Authentic/Human ${data.type}`;
                    resultConfidence.innerText = `Confidence: ${data.confidence}%`;
                }
            } catch (error) {
                console.error("Error:", error);
                alert("Ensure your backend is running.");
            }
        }
    </script>
</body>
</html>
